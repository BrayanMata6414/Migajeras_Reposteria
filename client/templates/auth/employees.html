<link rel="stylesheet" href="{{ url_for('static', filename='css/styleEmployees.css') }}">

{% extends 'navbar.html' %}

{% block title %}
Empleados
{% endblock %}

{% block titulo %} Empleados {% endblock %}

{% block content %}

    <div class="cont-tabla">

        <div class="tabla">

            {% for empleado in empleados %}

                <div class="cont-dat">

                    <p>
                        {{ empleado.matricula }}
                    </p>

                    <p>
                        {{ empleado.nombre }}
                    </p>

                    <p>
                        {{ empleado.puesto }}
                    </p>

                    <p>
                        {{ empleado.correo }}
                    </p>

                    <div class="cont-boton">

                        <button type="button">
                            Editar
                        </button>

                        <button type="button">
                            Borrar
                        </button>

                    </div>

                </div>

            {% endfor %}

        </div>

    </div>

    <div class="cont-formEmp">

        <form method="POST">

            <!-- MATRICULA -->

            <input
                type="text"
                name="matricula"
                value="{{ matricula }}"
                readonly
            >

            <!-- NOMBRE -->

            <input
                type="text"
                name="nombre"
                id="nombre"
                placeholder="Nombre"
                required
            >

            <!-- PUESTO -->

            <select name="puesto" required>

                <option value="">
                    Selecciona un puesto
                </option>

                <option value="Administrador">
                    Administrador
                </option>

                <option value="Caja">
                    Caja
                </option>

                <option value="Almacen">
                    Almacén
                </option>

                <option value="Cocina">
                    Cocina
                </option>

            </select>

            <!-- CORREO -->

            <input
                type="email"
                name="correo"
                id="correo"
                placeholder="Correo"
                required
            >

            <!-- PASSWORD -->

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Registrar empleado
            </button>

        </form>

    </div>

    <script>

        const inputNombre =
            document.getElementById('nombre');

        const inputCorreo =
            document.getElementById('correo');

        inputNombre.addEventListener('input', () => {

            const nombre =
                inputNombre.value
                .trim()
                .split(' ')[0];

            const anio =
                new Date()
                .getFullYear()
                .toString()
                .slice(-2);

            inputCorreo.value =
                `${nombre}${anio}@paloma.com`;

        });

    </script>

{% endblock %}
